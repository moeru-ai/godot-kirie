<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kirie Basic IPC</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <section class="card">
    <h1>Kirie Basic IPC</h1>
    <p>
      This page sends a <code>web_ready</code> message on load and listens for
      <code>kirie:ipc-message</code> events dispatched by the Android bridge.
    </p>
    <div class="row">
      <button id="sendButton" type="button">Send web_ping</button>
    </div>
    <pre id="log">Page booting…</pre>
  </section>

  <script>
    const mode = globalThis.__KIRIE_MODE__ === "probe" ? "probe" : "manual";
    const logNode = document.getElementById("log");

    function appendLog(line) {
      logNode.textContent = `${logNode.textContent}\n${line}`;
      console.log(line);
    }

    function postToGodot(message) {
      const encoded = JSON.stringify(message);
      const androidBridge = globalThis.KirieAndroidBridge;
      if (androidBridge && typeof androidBridge.postMessage === "function") {
        androidBridge.postMessage(encoded);
        appendLog(`Sent to Godot: ${encoded}`);
        return;
      }

      const iosBridge = globalThis.webkit?.messageHandlers?.kirie;
      if (iosBridge && typeof iosBridge.postMessage === "function") {
        iosBridge.postMessage(encoded);
        appendLog(`Sent to Godot: ${encoded}`);
        return;
      }

      appendLog("Kirie native bridge is unavailable");
    }

    window.addEventListener("kirie:ipc-message", (event) => {
      const message = event.detail;
      appendLog(`Received from Godot: ${JSON.stringify(message)}`);

      if (mode === "probe" && message?.type === "godot_ready") {
        postToGodot({
          type: "web_ack",
          payload: {
            source: "probe",
            acknowledgedType: message.type,
          },
        });
      }
    });

    document.getElementById("sendButton").addEventListener("click", () => {
      postToGodot({
        type: "web_ping",
        payload: {
          source: "web",
        },
      });
    });

    appendLog(`Mode: ${mode}`);

    postToGodot({
      type: "web_ready",
      payload: {
        source: mode,
        userAgent: navigator.userAgent,
      },
    });
  </script>
</body>
</html>
